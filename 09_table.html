<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table { 
            width: 50%;
            border-spacing: 35px;

        }
        table,th,td { 
            border: 1px solid black;
            border-radius: 10px;
            border-collapse: collapse; 
            
        }
        
        td {
            padding: 10px;
        }
        tr:nth-child(even){
            background-color: aqua;
        }
        th:nth-child(odd), td:nth-child(odd){
            background-color: chartreuse;
        }
    </style>
</head>
<body>
    <table>
        <tr style="height: 60px;">
            <th style="width: 50%;">Name</th>
            <th>Last Name</th>
            <th>Age</th>
        </tr>
        <tr>
        <td>John</td>
        <td>Smith</td>
        <td>18</td>
    </tr>
    <tr>
        <td>Su</td>
        <td>Zan</td>
        <td>14</td>
    </tr>
    </table>
</body>
</html>
