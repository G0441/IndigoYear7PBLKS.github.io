<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Span</title>
    <style>
        table {
            width: 50%;
        }
        table,th,td {
            border: 2px solid black;
            border-collapse: collapse;
        }
        th {
            text-align: left;
        }
        td {
            text-align: right;
        }
    
        
    </style>
</head>
<body>
    <table> 
        <caption>User Information</caption>
        <tr>
            <th  colspan="2">Name</th>
            <th>Age</th>
        </tr>
        <tr>
            <td>Jill</td>
            <td>Smith</td>
            <td>50</td>
        </tr>
        <tr>
            <td>John</td>
            <td>Doe</td>
            <td>52</td>
        </tr>
    </table>
    
    <br><br>

    <table>
        <tr>
            <th>Name</th>
            <td>Jill</td>

        </tr>
        <tr>
            <th rowspan="2">Phone Number</th>
            <td>84752599</td>
        </tr>
        <tr>
            <td>38476546</td>
        </tr>
    </table>
</body>
</html>
