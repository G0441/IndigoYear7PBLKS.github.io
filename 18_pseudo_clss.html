<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo Class</title>
    <style>
        p:first-child {
            color: red;
            background-color: yellow;
        }
        p:last-child {
            color: blue;
        }
        
    </style>
</head>
<body>
    <h2>Pseudo Class</h2>
    <p>First Paragraph</p>
    <p>Second Paragraph</p>
    <div>
        <p>first P in div</p>
        <p>second P in div</p>
    </div>
    <p>Last Paragraph</p>
</body>
</html>
