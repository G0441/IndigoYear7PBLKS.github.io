<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        p::first-line {
            color: blue;
            font-size: 20px;
            font-weight: bold;
            font-family: Arial, sans-serif;
        }
        p::first-letter {
            color: red;
            font-size: 30px;
            font-weight: bold;
            font-family: Arial, sans-serif;
        }
        h1::before {
            content: "Welcome to ";
            color: green;
            font-size: 24px;
            content: "Welcome to ";
        }
        h1::after {
            content: " Web Development!";
            color: orange;
            font-size: 24px;
        }
        ::selection {
            background-color: rgb(0, 255, 98);
            color: rgb(218, 0, 252);
        }
    </style>
</head>
<body>
    <h1>Pseudo Elements</h1>
    <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit. Sapiente libero placeat voluptates laudantium a nam corrupti doloribus, harum saepe, doloremque aliquid adipisci quibusdam, cum minima voluptatem pariatur impedit possimus dolorem.</p>
</body>
</html>
