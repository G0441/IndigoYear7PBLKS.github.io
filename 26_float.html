<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Float</title>
    <style>
        .p img {
            float: left;
            margin-right: 15px;
            width: 20px;
            height: 20px;
        }
        .p {
            overflow: hidden;
            border: #000 solid;
        }
        .div {
            border-radius: 2px black solid;
            float: left;
        }
    </style>
</head>
<body>
    <p>
        <img src="Image/BMW sport type.jpg" alt="BMW">
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Quisquam itaque in tempore dolorum illum pariatur consequuntur doloribus vel perferendis. Omnis earum qui accusantium dolorum eius dicta reiciendis ducimus, sed culpa.
    </p>
    <div>Item1</div>
    <div>Item2</div>
</body>
</html>
